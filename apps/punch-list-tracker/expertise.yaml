# punch-list-tracker — expertise.yaml
# Project memory for AI assistants (Rebar)

app: punch-list-tracker
last_updated: "2026-04-13"

architecture:
  purpose: >
    Track punch lists: open defects, incomplete work, and sign-off items for
    construction handover, commissioning, facility turnover, or tenant build-outs.
  repository_state: >
    Phases 1–7: Next.js 16, Prisma 6, REST API, UI with modals for add project/item, color-coded priority,
    dashboard (completion %, breakdowns by location/priority/assignee, list summaries). README documents Vercel
    env/migrations, status workflow, enhancements; replace placeholder production URL with the live deployment.
  requirements_source: apps/punch-list-tracker/requirements.md
  implementation_plan: apps/punch-list-tracker/specs/mvp-implementation.md
  domain_entities_sketch:
    - job_or_project: container for a site, phase, or contract area
    - punch_item: description, location, trade, priority, status, assignee, due date, evidence (photos)
    - optional: areas_floors_rooms, watchers, approval_workflow
  technical_stack:
    from_project_requirements: "TypeScript monorepo, Next.js on Vercel, Neon (Postgres), Prisma — see specs/mvp-implementation.md"
  platform_and_auth: >
    TBD until product direction is set: target clients (web SPA, mobile, desktop)
    and authentication / authorization model.
  suggested_concerns_when_building:
    - offline_or_field_use_if_mobile
    - permissions_roles_for_gc_subs_and_owner
    - export_pdf_csv_for_job_closeout

api_gotchas:
  - "PATCH /api/punch-items/[id] uses parseUpdatePunchItem; illegal status transitions return 400 with Zod-shaped issues."
  - "POST punch items only under /api/projects/[projectId]/punch-items; photo is URL-only MVP (no multipart upload)."

key_decisions:
  - "Adopt Rebar (CLAUDE.md, expertise.yaml, wiki/, raw/) so operational and domain context survives across sessions and stays in git."
  - "MVP implementation plan produced with rebar_plan → apps/punch-list-tracker/specs/mvp-implementation.md (2026-04-13)."

known_issues:
  - "Production build on Windows can hit Prisma EPERM if `npm run dev` is running; stop dev before `npm run build -w web`."

implementation_patterns:
  punch_item_lifecycle: "Per requirements.md: only open, in_progress, complete — enforce transitions server-side (no extra statuses for MVP)."
  audit_fields: "Once persistence exists, use created_at/updated_at and who changed status."
  identifiers: "Use stable IDs for items and attachments; avoid relying on display order alone."

unvalidated_observations: []
